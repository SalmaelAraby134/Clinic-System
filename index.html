<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCare Clinic — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="bg-overlay"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="brand">
    <span class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></span>
    <span class="brand-name">MediCare</span>
  </div>

  <div class="card-wrapper">
    <div class="card">

      <div class="tab-switcher">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <div class="toast" id="toast"></div>

      <!-- LOGIN -->
      <div class="form-section active" id="loginSection">
        <div class="form-header">
          <h2>Welcome back</h2>
          <p>Sign in to your clinic account</p>
        </div>
        <div class="form-group">
          <label for="loginPhone">Phone Number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-phone input-icon"></i>
            <input type="tel" id="loginPhone" placeholder="01xxxxxxxxx" maxlength="11" />
          </div>
          <span class="field-error" id="loginPhoneErr"></span>
        </div>
        <div class="form-group">
          <label for="loginPass">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="loginPass" placeholder="••••••••" />
            <button class="toggle-pass" onclick="togglePass('loginPass', this)" tabindex="-1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="loginPassErr"></span>
        </div>
        <button class="btn-primary" onclick="handleLogin()">
          <span>Sign In</span><i class="fa-solid fa-arrow-right-long"></i>
        </button>
        <p class="switch-hint">Don't have an account? <a onclick="switchTab('signup')">Create one</a></p>
      </div>

      <!-- SIGNUP -->
      <div class="form-section" id="signupSection">
        <div class="form-header">
          <h2>Create account</h2>
          <p>Join MediCare Clinic today</p>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="signupEmail" placeholder="you@example.com" />
          </div>
          <span class="field-error" id="signupEmailErr"></span>
        </div>
        <div class="form-group">
          <label for="signupPhone">Phone Number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-phone input-icon"></i>
            <input type="tel" id="signupPhone" placeholder="01xxxxxxxxx" maxlength="11" />
          </div>
          <span class="field-error" id="signupPhoneErr"></span>
        </div>
        <div class="form-group">
          <label for="signupPass">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="signupPass" placeholder="Min. 6 characters" />
            <button class="toggle-pass" onclick="togglePass('signupPass', this)" tabindex="-1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="signupPassErr"></span>
        </div>
        <button class="btn-primary" onclick="handleSignup()">
          <span>Create Account</span><i class="fa-solid fa-arrow-right-long"></i>
        </button>
        <p class="switch-hint">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
      </div>

    </div>
    <div class="card-footer-tag">
      <i class="fa-solid fa-shield-heart"></i> Secure & Confidential
    </div>

    <a href="pages/admin-login.html" class="admin-portal-link">
  <i class="fa-solid fa-user-shield"></i> Admin Portal
</a>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
